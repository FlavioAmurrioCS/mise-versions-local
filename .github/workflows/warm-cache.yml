name: warm-cache

# Every 2 hours: fetch the latest mise-versions docs, warm the /api/github cache
# by installing tools.txt against the server on amd64 + arm64, bundle docs + the
# merged cache, and publish it to the rolling `cache-latest` release.
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      versions:
        description: "Latest N versions to warm per bare tool"
        default: "10"

permissions:
  contents: write

concurrency:
  group: warm-cache
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.docs.outputs.commit }}
    steps:
      - name: Fetch latest mise-versions docs
        id: docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          commit=$(gh api repos/jdx/mise-versions/commits/main --jq .sha)
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          curl -fsSL -o mv.zip "https://github.com/jdx/mise-versions/archive/${commit}.zip"
          unzip -q mv.zip
          mv "mise-versions-${commit}/docs" docs
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs
          retention-days: 1

  warm:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs
      - name: Warm cache
        env:
          DOCS_DIR: ${{ github.workspace }}/docs
          CACHE_DIR: ${{ github.workspace }}/cache
          GITHUB_TOKEN: ${{ github.token }}
          # Scheduled runs use repo variable VERSIONS (set it to 10 to warm
          # history); manual runs use the dispatch input. Defaults to 1.
          VERSIONS: ${{ github.event.inputs.versions || vars.VERSIONS || '1' }}
        run: bash scripts/warm-cache.sh
      - uses: actions/upload-artifact@v4
        with:
          name: cache-${{ matrix.arch }}
          path: cache
          retention-days: 1

  bundle:
    needs: [prepare, warm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: bundle/docs
      - uses: actions/download-artifact@v4
        with:
          name: cache-amd64
          path: cache-amd64
      - uses: actions/download-artifact@v4
        with:
          name: cache-arm64
          path: cache-arm64
      - name: Merge caches, manifest, and tar
        run: |
          set -euo pipefail
          mkdir -p bundle/cache
          # Shared release entries are byte-identical across arches (same key);
          # per-arch attestation entries have distinct keys. Copying both merges
          # and dedupes in one shot.
          cp -a cache-amd64/. bundle/cache/
          cp -a cache-arm64/. bundle/cache/
          jq -n \
            --arg t "$(date -u +%FT%TZ)" \
            --arg c "${{ needs.prepare.outputs.commit }}" \
            --argjson n "$(find bundle/cache -name '*.meta' | wc -l)" \
            --rawfile tools tools.txt \
            '{generated_at:$t, mise_versions_commit:$c, arches:["amd64","arm64"],
              cache_entries:$n,
              tools:($tools|split("\n")|map(select(startswith("#")|not))|map(select(length>0)))}' \
            > bundle/MANIFEST.json
          cat bundle/MANIFEST.json
          tar --zstd -cf mise-versions-bundle.tar.zst -C bundle docs cache MANIFEST.json
          ls -lh mise-versions-bundle.tar.zst
      - name: Publish to cache-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view cache-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create cache-latest --repo "$GITHUB_REPOSITORY" \
              --title "Pre-warmed mirror bundle" \
              --notes "Rolling docs/ + /api/github cache bundle, refreshed every 2h by the warm-cache workflow."
          gh release upload cache-latest mise-versions-bundle.tar.zst \
            --repo "$GITHUB_REPOSITORY" --clobber
