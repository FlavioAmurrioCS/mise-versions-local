services:
  mise-versions:
    build:
      context: .
      dockerfile: Dockerfile
    # DOCS_DIR, CACHE_DIR, and ADDR are baked into the image (see Dockerfile);
    # override CACHE_TTL/UPSTREAM here if you want non-default proxy behavior.
    environment:
      # How long a cached /api/github entry is served before revalidating with
      # the upstream. Upstream max-age overrides this per-response when present.
      CACHE_TTL: 1h
      # Real host to mirror /api/github/* from (a CDN cache, so no GitHub rate
      # limit and no token needed).
      UPSTREAM: https://mise-versions.jdx.dev
    ports:
      - 8080:8080
    # No cache bind mount: the image already ships a warmed /api/github cache at
    # /app/api/github, and a host bind mount would shadow it. To persist runtime
    # revalidations while keeping the baked entries, use a named volume instead
    # (seeded from the image on first run):
    #   volumes: [cache:/app/api/github]   # + a top-level `volumes: { cache: {} }`
    develop:
      watch:
        - path: main.go
          action: rebuild

